<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Crime Reporting App</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <!-- Header placeholder -->
    <div id="header-placeholder"></div>

    <!-- Main Content -->
    <main class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2 data-i18n="create_account">Create Account</h2>
                <p data-i18n="register_subtitle">Join our community to report crimes and stay safe</p>
            </div>

            <!-- Registration Form -->
            <form id="registerForm" class="auth-form active" onsubmit="return handleRegister(event)">
                <div class="form-group">
                    <label for="fullname">
                        <i class="fas fa-user"></i>
                        <span data-i18n="full_name">Full Name</span>
                    </label>
                    <input type="text" id="fullname" name="fullname" class="form-control" 
                           placeholder="Enter your full name" required
                           data-parsley-pattern="^[a-zA-Z\s]+$"
                           data-parsley-trigger="blur">
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i>
                        <span data-i18n="email">Email</span>
                    </label>
                    <input type="email" id="email" name="email" class="form-control" 
                           placeholder="Enter your email" required 
                           data-parsley-type="email"
                           data-parsley-trigger="blur">
                </div>

                <div class="form-group">
                    <label for="phone">
                        <i class="fas fa-phone"></i>
                        <span data-i18n="phone">Phone Number</span>
                    </label>
                    <input type="tel" id="phone" name="phone" class="form-control" 
                           placeholder="Enter your phone number" required
                           data-parsley-pattern="^[\d\s\+\-\(\)]{10,}$"
                           data-parsley-trigger="blur">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            <span data-i18n="password">Password</span>
                        </label>
                        <input type="password" id="password" name="password" class="form-control" 
                               placeholder="Create password" required
                               data-parsley-minlength="6"
                               data-parsley-trigger="keyup">
                        <small class="password-hint" data-i18n="password_hint">Minimum 6 characters</small>
                    </div>

                    <div class="form-group">
                        <label for="confirm_password">
                            <i class="fas fa-lock"></i>
                            <span data-i18n="confirm_password">Confirm Password</span>
                        </label>
                        <input type="password" id="confirm_password" name="confirm_password" class="form-control" 
                               placeholder="Confirm password" required
                               data-parsley-equalto="#password"
                               data-parsley-trigger="keyup">
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="terms" name="terms" required
                               data-parsley-required="true"
                               data-parsley-required-message="You must accept the terms and conditions">
                        <span class="checkmark"></span>
                        <span data-i18n="accept_terms">I accept the <a href="terms.html" target="_blank">Terms and Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a></span>
                    </label>
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="anonymous" name="anonymous">
                        <span class="checkmark"></span>
                        <span data-i18n="anonymous_reporting">Enable anonymous reporting by default</span>
                    </label>
                </div>

                <button type="submit" class="btn-primary btn-block">
                    <i class="fas fa-user-plus"></i>
                    <span data-i18n="register">Create Account</span>
                </button>

                <div class="auth-footer">
                    <p data-i18n="have_account" >Already have an account?
                        <a href="login.html" class="btn-secondary btn-block" data-i18n="login">Login</a>
                    </p>
                    
                </div>
                
            </form>
        </div>
    </main>

    <!-- Footer placeholder -->
   <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/parsley.js/2.9.2/parsley.min.js"></script>
    
    <!-- Load our custom JavaScript files -->
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    
    <!-- Page specific initialization -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Parsley for form validation
            $('#registerForm').parsley();
            
            // Password strength checker
            const passwordInput = document.getElementById('password');
            if (passwordInput) {
                passwordInput.addEventListener('keyup', function() {
                    updatePasswordStrength(this.value);
                });
            }
        });
    </script>

    <style>
        /* Registration page specific styles */
        .password-hint {
            display: block;
            font-size: 0.8rem;
            color: var(--neutral);
            margin-top: 0.3rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .checkbox-container a {
            color: var(--primary);
            text-decoration: none;
        }

        .checkbox-container a:hover {
            text-decoration: underline;
        }

        /* Password strength indicator */
        .password-strength {
            height: 4px;
            margin-top: 0.5rem;
            border-radius: 2px;
            background: #dee2e6;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: width 0.3s, background-color 0.3s;
        }

        .strength-bar.weak {
            width: 33.33%;
            background: var(--danger);
        }

        .strength-bar.medium {
            width: 66.66%;
            background: var(--warning);
        }

        .strength-bar.strong {
            width: 100%;
            background: var(--success);
        }

        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</body>
</html>
