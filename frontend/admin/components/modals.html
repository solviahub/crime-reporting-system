<!-- Common Modals -->

<!-- Confirm Action Modal -->
<div class="modal" id="confirmModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Confirm Action</h3>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <p>Are you sure you want to proceed with this action?</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" data-dismiss="modal">Cancel</button>
            <button class="btn-primary" id="confirmAction">Confirm</button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div class="modal" id="deleteModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Delete Item</h3>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <p>This action cannot be undone. Are you sure?</p>
        </div>
        <div class="modal-footer">
            <button class="btn-secondary" data-dismiss="modal">Cancel</button>
            <button class="btn-danger" id="deleteConfirm">Delete</button>
        </div>
    </div>
</div>

<!-- Success Modal -->
<div class="modal" id="successModal">
    <div class="modal-content success">
        <div class="modal-header">
            <i class="fas fa-check-circle success-icon"></i>
            <h3>Success!</h3>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <p id="successMessage">Operation completed successfully.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" data-dismiss="modal">OK</button>
        </div>
    </div>
</div>

<!-- Error Modal -->
<div class="modal" id="errorModal">
    <div class="modal-content error">
        <div class="modal-header">
            <i class="fas fa-exclamation-circle error-icon"></i>
            <h3>Error</h3>
            <button class="close-modal">&times;</button>
        </div>
        <div class="modal-body">
            <p id="errorMessage">An error occurred. Please try again.</p>
        </div>
        <div class="modal-footer">
            <button class="btn-primary" data-dismiss="modal">Close</button>
        </div>
    </div>
</div>
